# yamllint disable rule:document-start
# yamllint disable rule:truthy
name: Dependency Security
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 11 * * *"
  workflow_dispatch:
permissions:
  contents: read
jobs:
  dependency-security:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/fulmenhq/goneat-tools-runner-glibc:v0.4.2
      options: --user 1001
    defaults:
      run:
        shell: bash
    env:
      FULMEN_WORKSPACE_ROOT: ${{ github.workspace }}
      GOPATH: ${{ github.workspace }}/../_go
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Prepare Go directories
        run: mkdir -p "$GOPATH/bin" "$GOPATH/pkg"
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
      - name: Verify dependency security gate
        run: |
          set -euo pipefail
          goneat --version
          go version
          go mod download
          goneat assess --categories dependencies --check --fail-on high
