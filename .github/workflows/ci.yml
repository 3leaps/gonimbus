# yamllint disable rule:document-start
# yamllint disable rule:truthy
name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  # Container-based format checking (LOW friction - v0.3.14+)
  # Uses goneat-tools-runner which has foundation tools pre-installed
  format-check:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/fulmenhq/goneat-tools-runner-glibc:v0.4.2
      # goneat-tools-runner is a full CI runner image.
      # Use UID 1001 to match GitHub-hosted runner workspace ownership.
      options: --user 1001
    # Force bash for all run: steps. The -glibc image does not expose bash as
    # GHA's default container shell, so GHA falls back to sh which lacks
    # `set -o pipefail`. Per-step `shell: bash` works too (see release.yml);
    # the job-level default is the same idea expressed once.
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Verify foundation tools
        run: |
          set -euo pipefail
          prettier --version
          yamlfmt --version
          jq --version
          yq --version
          rg --version
      - name: Check formatting
        run: |
          set -euo pipefail
          yamlfmt -lint .
          prettier --check "**/*.{md,json}" || \
            echo "Prettier differences found (non-blocking)"
  # Build and test using goneat-tools-runner container
  # Runner provides foundation tools + goneat/sfetch; Go is set up separately.
  build-test:
    needs: [format-check]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/fulmenhq/goneat-tools-runner-glibc:v0.4.2
      # goneat-tools-runner is a full CI runner image.
      # Use UID 1001 to match GitHub-hosted runner workspace ownership.
      options: --user 1001
    # Force bash for run: steps; see format-check job for rationale.
    defaults:
      run:
        shell: bash
    env:
      FULMEN_WORKSPACE_ROOT: ${{ github.workspace }}
      # GOPATH points to a workspace-relative path because goneat-tools-runner
      # v0.3+ runs as non-root (UID 1001) and /opt/gopath/bin is not writable
      # by that user. actions/setup-go@v5 expects $GOPATH/bin to be writable.
      GOPATH: ${{ github.workspace }}/../_go
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Prepare Go directories
        # Pre-create the writable workspace-relative GOPATH so actions/setup-go
        # does not fail with EACCES under the non-root runner user.
        run: mkdir -p "$GOPATH/bin" "$GOPATH/pkg"
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
      - name: Verify runner + Go toolchain
        run: |
          set -euo pipefail
          prettier --version
          yamlfmt --version
          sfetch --version
          goneat --version
          command -v go
          go version
          go env GOPATH
          go mod download
      - name: Format (using goneat - fail on diff)
        run: |
          set -euo pipefail
          make fmt
          git diff --exit-code
      - name: API stability
        run: |
          set -euo pipefail
          make api-stability
      - name: Install golangci-lint (v2)
        # goneat-tools-runner does not ship golangci-lint yet.
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.2
          args: --help
      - name: Verify golangci-lint
        run: |
          set -euo pipefail
          golangci-lint --version
      - name: Lint
        run: |
          set -euo pipefail
          make lint
      - name: Test
        run: |
          set -euo pipefail
          make test
      - name: Test libsql build tag
        run: |
          set -euo pipefail
          go test ./... -v -tags gonimbus_libsql
      - name: Build binary
        run: |
          set -euo pipefail
          make build
      - name: Build libsql binary
        run: |
          set -euo pipefail
          go build -tags gonimbus_libsql ./cmd/gonimbus
      - name: Cross-compile default pure-Go graph
        env:
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          GOOS=linux GOARCH=arm64 go build ./...
  # Native Windows coverage for handle-relative job registry mutation and the
  # SQLite snapshot binding contract. These cannot be certified by
  # cross-compilation because share masks, access masks, replacement denial,
  # and reparse behavior are enforced only by the Windows kernel.
  windows-jobregistry:
    needs: [format-check]
    name: windows-jobregistry (${{ matrix.goarch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            goarch: amd64
          - runner: windows-latest-arm64-s
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
      - name: Verify native runner architecture
        shell: pwsh
        run: |
          $actual = go env GOARCH
          if ($actual -ne '${{ matrix.goarch }}') {
            throw "Expected native GOARCH=${{ matrix.goarch }}, got $actual"
          }
          go version
      - name: Run native SQLite snapshot authority suite
        shell: pwsh
        run: go test ./pkg/indexstore -run '^TestOpenLocalReadOnlyWindows' -count=1 -v
      - name: Run native registry security suite
        shell: pwsh
        run: go test ./pkg/jobregistry -count=1 -v
      - name: Build native Windows CLI
        shell: pwsh
        run: go build ./cmd/gonimbus
  # Cloud integration tests with moto (S3 emulation)
  # Runs on main branch and PRs to catch S3 SDK issues
  cloud-integration:
    needs: [build-test]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/fulmenhq/goneat-tools-runner-glibc:v0.4.2
      options: --user 1001
    # Force bash for run: steps; see format-check job for rationale.
    defaults:
      run:
        shell: bash
    services:
      moto:
        image: motoserver/moto:latest
        ports:
          - 5555:5000
    env:
      MOTO_ENDPOINT: http://moto:5000
      FULMEN_WORKSPACE_ROOT: ${{ github.workspace }}
      # Workspace-relative GOPATH: see build-test job for rationale (non-root
      # runner user cannot write to the image's default /opt/gopath/bin).
      GOPATH: ${{ github.workspace }}/../_go
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Prepare Go directories
        run: mkdir -p "$GOPATH/bin" "$GOPATH/pkg"
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
      - name: Build binary
        run: |
          set -euo pipefail
          make build
      - name: Run cloud integration tests
        run: |
          set -euo pipefail
          go test ./... -v -tags=cloudintegration
