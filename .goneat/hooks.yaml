version: "1.0.0"
hooks:
  pre-commit:
    - command: "assess"
      args:
        - "--categories"
        - "format,lint,security"
        - "--fail-on"
        - "critical"
        - "--package-mode"
      priority: 10
      timeout: "90s"
  pre-push:
    # Delegate to the checked-in hook script so installed git hooks and
    # `make prepush` use the same changed-file scoped implementation.
    - command: "bash"
      args:
        - ".goneat/hooks/pre-push"
      priority: 10
      timeout: "2m"
optimization:
  cache_results: true
  content_source: working
  only_changed_files: true
  parallel: auto
